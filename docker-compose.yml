version: '3.8'

services:
  focus-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: focus:latest
    container_name: focus-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SEATGEEK_CLIENT_ID=${SEATGEEK_CLIENT_ID:-}
      - SEATGEEK_CLIENT_SECRET=${SEATGEEK_CLIENT_SECRET:-}
      # Firebase (opcional - modo demo si no está configurado)
      - FIREBASE_API_KEY=${FIREBASE_API_KEY:-}
      - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-}
      - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID:-}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID:-}
    volumes:
      - focus-app-data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "http.get('http://localhost:3000').on('error', () => process.exit(1)).on('response', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  focus-nginx:
    image: nginx:alpine
    container_name: focus-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - focus-app

volumes:
  focus-app-data:
